replicaCount: 3

image:
  repository: ghcr.io/ayushishrot/orders
  tag: "1.4.2"
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Canary | BlueGreen — drives which Rollout strategy template renders.
rolloutStrategy: Canary

serviceAccount:
  create: true
  # Annotate with an IRSA role ARN to grant least-privilege AWS access.
  annotations: {}

env:
  KAFKA_BROKERS: kafka-bootstrap.kafka.svc:9092
  LOG_LEVEL: info

ingress:
  enabled: true
  className: nginx
  host: orders.dev.example.com
