name: validate-manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  helm:
    name: helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.15.2
      - name: helm lint
        run: helm lint apps/orders/chart
      - name: helm template (default)
        run: helm template orders apps/orders/chart > /tmp/orders.yaml
      - name: helm template (prod values)
        run: helm template orders apps/orders/chart -f apps/orders/chart/values-prod.yaml > /tmp/orders-prod.yaml

  kubeconform:
    name: kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform
      - name: Validate static manifests
        run: |
          kubeconform -strict -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            bootstrap/ apps/orders/rollout/
