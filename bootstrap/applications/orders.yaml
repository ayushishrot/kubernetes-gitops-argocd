apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orders
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/ayushishrot/kubernetes-gitops-argocd
    targetRevision: main
    path: apps/orders/chart
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: orders
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 3m }
